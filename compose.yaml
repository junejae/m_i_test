name: mig-inference

x-vllm-common: &vllm-common
  image: vllm/vllm-openai:latest
  ipc: host
  runtime: nvidia
  environment:
    NVIDIA_DRIVER_CAPABILITIES: compute,utility
    HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
  volumes:
    - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
    interval: 20s
    timeout: 5s
    retries: 15

services:
  # GPU 0 is already in use elsewhere and is intentionally not touched.
  # Every service below is pinned to a MIG instance created on GPU 1.
  mig-vllm-1:
    <<: *vllm-common
    image: ${VLLM_OPENAI_IMAGE_1:-vllm/vllm-openai:v0.17.0}
    container_name: mig-vllm-1
    environment:
      NVIDIA_VISIBLE_DEVICES: ${MIG_UUID_1}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    command: >
      ${MODEL_1}
      --host 0.0.0.0
      --port 8000
      --served-model-name ${SERVED_MODEL_NAME_1}
      --dtype ${DTYPE_1}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION_1}
      --max-model-len ${MAX_MODEL_LEN_1}
      --max-num-seqs ${MAX_NUM_SEQS_1}
      --max-num-batched-tokens ${MAX_NUM_BATCHED_TOKENS_1}
      --limit-mm-per-prompt.image 0
      --limit-mm-per-prompt.video 0
      --tensor-parallel-size 1
      ${VLLM_EXTRA_ARGS_1}
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${PORT_1}:8000"

  mig-vllm-2:
    <<: *vllm-common
    container_name: mig-vllm-2
    environment:
      NVIDIA_VISIBLE_DEVICES: ${MIG_UUID_2}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    command: >
      ${MODEL_2}
      --host 0.0.0.0
      --port 8000
      --served-model-name ${SERVED_MODEL_NAME_2}
      --dtype ${DTYPE_2}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION_2}
      --max-model-len ${MAX_MODEL_LEN_2}
      --max-num-seqs ${MAX_NUM_SEQS_2}
      --max-num-batched-tokens ${MAX_NUM_BATCHED_TOKENS_2}
      --limit-mm-per-prompt.image ${MM_IMAGE_LIMIT_2}
      --limit-mm-per-prompt.video ${MM_VIDEO_LIMIT_2}
      --tensor-parallel-size 1
      ${VLLM_EXTRA_ARGS_2}
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${PORT_2}:8000"

  mig-vllm-3:
    <<: *vllm-common
    container_name: mig-vllm-3
    environment:
      NVIDIA_VISIBLE_DEVICES: ${MIG_UUID_3}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    command: >
      ${MODEL_3}
      --host 0.0.0.0
      --port 8000
      --served-model-name ${SERVED_MODEL_NAME_3}
      --dtype ${DTYPE_3}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION_3}
      --max-model-len ${MAX_MODEL_LEN_3}
      --max-num-seqs ${MAX_NUM_SEQS_3}
      --max-num-batched-tokens ${MAX_NUM_BATCHED_TOKENS_3}
      --tensor-parallel-size 1
      ${VLLM_EXTRA_ARGS_3}
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${PORT_3}:8000"

  mig-vllm-4:
    <<: *vllm-common
    container_name: mig-vllm-4
    environment:
      NVIDIA_VISIBLE_DEVICES: ${MIG_UUID_4}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    command: >
      ${MODEL_4}
      --host 0.0.0.0
      --port 8000
      --served-model-name ${SERVED_MODEL_NAME_4}
      --dtype ${DTYPE_4}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION_4}
      --max-model-len ${MAX_MODEL_LEN_4}
      --max-num-seqs ${MAX_NUM_SEQS_4}
      --max-num-batched-tokens ${MAX_NUM_BATCHED_TOKENS_4}
      --tensor-parallel-size 1
      ${VLLM_EXTRA_ARGS_4}
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${PORT_4}:8000"

  mig-asr-5:
    build:
      context: ./asr-server
    container_name: mig-asr-5
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: ${MIG_UUID_5}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      ASR_MODEL_ID: ${ASR_MODEL_5}
      ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE_5}
      ASR_BEAM_SIZE: ${ASR_BEAM_SIZE_5}
      ASR_LANGUAGE: ${ASR_LANGUAGE_5}
      ASR_DEVICE: ${ASR_DEVICE_5}
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 15
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${PORT_5}:8000"

  mig-vllm-6:
    # Qwen3-TTS requires the vLLM-Omni serving path.
    image: vllm/vllm-omni:v0.14.0
    container_name: mig-vllm-6
    ipc: host
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: ${MIG_UUID_6}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 15
    command: >
      vllm serve ${MODEL_6}
      --host 0.0.0.0
      --port 8000
      --served-model-name ${SERVED_MODEL_NAME_6}
      --stage-configs-path vllm_omni/model_executor/stage_configs/qwen3_tts.yaml
      --omni
      --trust-remote-code
      --enforce-eager
      --dtype ${DTYPE_6}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION_6}
      --max-model-len ${MAX_MODEL_LEN_6}
      --max-num-seqs ${MAX_NUM_SEQS_6}
      --max-num-batched-tokens ${MAX_NUM_BATCHED_TOKENS_6}
      --tensor-parallel-size 1
      ${VLLM_EXTRA_ARGS_6}
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${PORT_6}:8000"

  mig-diffusion-7:
    build:
      context: ./diffusion-server
    container_name: mig-diffusion-7
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: ${MIG_UUID_7}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      DIFFUSION_MODEL_ID: ${DIFFUSION_MODEL_7}
      DIFFUSION_DEVICE: ${DIFFUSION_DEVICE_7}
      DIFFUSION_DTYPE: ${DIFFUSION_DTYPE_7}
      DIFFUSION_DEFAULT_HEIGHT: ${DIFFUSION_DEFAULT_HEIGHT_7}
      DIFFUSION_DEFAULT_WIDTH: ${DIFFUSION_DEFAULT_WIDTH_7}
      DIFFUSION_DEFAULT_STEPS: ${DIFFUSION_DEFAULT_STEPS_7}
      DIFFUSION_DEFAULT_GUIDANCE: ${DIFFUSION_DEFAULT_GUIDANCE_7}
      DIFFUSION_NEGATIVE_PROMPT: ${DIFFUSION_NEGATIVE_PROMPT_7}
      DIFFUSION_ENABLE_CPU_OFFLOAD: ${DIFFUSION_ENABLE_CPU_OFFLOAD_7}
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, json; r=json.loads(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()); assert r['status']=='ok'"]
      interval: 30s
      timeout: 10s
      retries: 15
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${PORT_7}:8000"

  guardrails-proxy:
    build:
      context: ./guardrails-proxy
    container_name: guardrails-proxy
    environment:
      GUARDRAILS_UPSTREAM_BASE_URL: ${GUARDRAILS_UPSTREAM_BASE_URL:-http://mig-vllm-1:8000}
      GUARDRAILS_EMBEDDINGS_BASE_URL: ${GUARDRAILS_EMBEDDINGS_BASE_URL:-http://mig-vllm-3:8000}
      GUARDRAILS_SERVED_MODEL_NAME: ${GUARDRAILS_SERVED_MODEL_NAME:-qwen3.5-4b}
      GUARDRAILS_REQUEST_TIMEOUT_SECONDS: ${GUARDRAILS_REQUEST_TIMEOUT_SECONDS:-300}
      GUARDRAILS_ANALYZER_TIMEOUT_SECONDS: ${GUARDRAILS_ANALYZER_TIMEOUT_SECONDS:-1.5}
      GUARDRAILS_PHASE1_ENABLED: ${GUARDRAILS_PHASE1_ENABLED:-1}
      GUARDRAILS_PHASE2_ENABLED: ${GUARDRAILS_PHASE2_ENABLED:-1}
      GUARDRAILS_PHASE3_ENABLED: ${GUARDRAILS_PHASE3_ENABLED:-1}
      GUARDRAILS_PHASE4_ENABLED: ${GUARDRAILS_PHASE4_ENABLED:-0}
      GUARDRAILS_PHASE2_MODE: ${GUARDRAILS_PHASE2_MODE:-observe}
      GUARDRAILS_PHASE3_MODE: ${GUARDRAILS_PHASE3_MODE:-observe}
      GUARDRAILS_FAIL_OPEN_ON_ANALYZER_TIMEOUT: ${GUARDRAILS_FAIL_OPEN_ON_ANALYZER_TIMEOUT:-1}
      GUARDRAILS_OUTPUT_SEMANTIC_NON_STREAM_ONLY: ${GUARDRAILS_OUTPUT_SEMANTIC_NON_STREAM_ONLY:-1}
      GUARDRAILS_RELEVANCE_ENABLED: ${GUARDRAILS_RELEVANCE_ENABLED:-0}
      GUARDRAILS_TOXICITY_ENABLED: ${GUARDRAILS_TOXICITY_ENABLED:-1}
      GUARDRAILS_PII_ENABLED: ${GUARDRAILS_PII_ENABLED:-1}
      GUARDRAILS_BLOCKLIST_PATH: ${GUARDRAILS_BLOCKLIST_PATH:-/app/config/blocklist.txt}
      GUARDRAILS_CONFIG_PATH: ${GUARDRAILS_CONFIG_PATH:-/app/config/policy.json}
      GUARDRAILS_GOLDEN_SET_PATH: ${GUARDRAILS_GOLDEN_SET_PATH:-/app/config/golden_set.json}
      GUARDRAILS_MAX_INPUT_CHARS: ${GUARDRAILS_MAX_INPUT_CHARS:-12000}
      GUARDRAILS_MAX_STREAM_INPUT_CHARS: ${GUARDRAILS_MAX_STREAM_INPUT_CHARS:-6000}
      GUARDRAILS_MAX_TOOL_COUNT: ${GUARDRAILS_MAX_TOOL_COUNT:-8}
      GUARDRAILS_MAX_MESSAGE_COUNT: ${GUARDRAILS_MAX_MESSAGE_COUNT:-64}
      GUARDRAILS_MAX_NON_STREAM_OUTPUT_CHARS: ${GUARDRAILS_MAX_NON_STREAM_OUTPUT_CHARS:-12000}
      GUARDRAILS_OUTPUT_BLOCKLIST_ENFORCE: ${GUARDRAILS_OUTPUT_BLOCKLIST_ENFORCE:-1}
      GUARDRAILS_TOXICITY_SAFE_THRESHOLD: ${GUARDRAILS_TOXICITY_SAFE_THRESHOLD:-0.3}
      GUARDRAILS_TOXICITY_DANGER_THRESHOLD: ${GUARDRAILS_TOXICITY_DANGER_THRESHOLD:-0.7}
      GUARDRAILS_RELEVANCE_SAFE_THRESHOLD: ${GUARDRAILS_RELEVANCE_SAFE_THRESHOLD:-0.5}
      GUARDRAILS_METRICS_ENABLED: ${GUARDRAILS_METRICS_ENABLED:-1}
      GUARDRAILS_ADMIN_API_KEY: ${GUARDRAILS_ADMIN_API_KEY:-}
      GUARDRAILS_ADMIN_UI_ENABLED: ${GUARDRAILS_ADMIN_UI_ENABLED:-1}
    restart: unless-stopped
    depends_on:
      - mig-vllm-1
      - mig-vllm-3
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, json; r=json.loads(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()); assert r['status'] in ('ok','degraded')"]
      interval: 20s
      timeout: 5s
      retries: 15
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${GUARDRAILS_PORT:-8111}:8000"

  proxy-gateway:
    image: nginx:1.27-alpine
    container_name: proxy-gateway
    depends_on:
      - guardrails-proxy
      - mig-vllm-1
      - mig-vllm-2
      - mig-vllm-3
      - mig-vllm-4
      - mig-asr-5
      - mig-vllm-6
      - mig-diffusion-7
    environment:
      PROXY_API_KEY: ${PROXY_API_KEY:-}
    volumes:
      - ./proxy-nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./proxy-nginx/certs:/etc/nginx/certs:ro
    # Keep nginx command form so docker-entrypoint runs template envsubst.
    command: ["nginx", "-g", "daemon off;"]
    restart: unless-stopped
    ports:
      - "${PROXY_BIND_HOST:-0.0.0.0}:${PROXY_HTTPS_PORT:-8443}:443"

  edge-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: edge-tunnel
    profiles: ["tunnel"]
    depends_on:
      - proxy-gateway
    # Quick tunnel mode (no Cloudflare account required).
    # It exposes the proxy through a temporary *.trycloudflare.com URL.
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - ${TUNNEL_LOGLEVEL:-info}
      - --url
      - ${TUNNEL_TARGET_URL:-https://proxy-gateway:443}
      - --no-tls-verify
    restart: unless-stopped
